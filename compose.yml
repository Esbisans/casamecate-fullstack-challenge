services:
  db:
    image: postgres:18-alpine
    container_name: casamecate-db
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-casamecate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-casamecate_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-casamecate}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
