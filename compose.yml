services:
  db:
    image: postgres:18-alpine
    container_name: casamecate-db
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-casamecate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-casamecate_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-casamecate}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: casamecate-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE__URL: postgresql+asyncpg://${POSTGRES_USER:-casamecate}:${POSTGRES_PASSWORD:-casamecate_dev_password}@db:5432/${POSTGRES_DB:-casamecate}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    container_name: casamecate-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3003}:3003"

volumes:
  postgres_data:
